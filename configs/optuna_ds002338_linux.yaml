study:
  name: optuna_ds002338
  default_mode: full
  direction: maximize
  n_trials: 20
  output_dir: outputs/optuna/ds002338
  command:
    - bash
    - scripts_linux/run_optuna_pretrain_and_finetune.sh
  static_args:
    - --target-dataset
    - ds002338
    - --pretrain-datasets
    - ds002336,ds002338,ds002739
  output_arg: --output-root

runtime_configs:
  train_base: configs/train_joint_contrastive.yaml
  finetune_base: configs/finetune_ds002338.yaml
  train_arg: --joint-train-config
  finetune_arg: --finetune-config

metric:
  type: csv
  path: finetune/loso_finetune_summary.csv
  column: macro_f1
  row_filter:
    fold: CROSS_FOLD_MEAN_STD

parameters:
  train_epochs:
    suggest: categorical
    choices: [20, 30]
    target: config
    config_updates:
      - config: train
        key: train.epochs
      - config: finetune
        key: finetune.epochs

  pretrain_batch_size:
    suggest: categorical
    choices: [8, 16]
    target: config
    config_updates:
      - config: train
        key: train.batch_size
      - config: train
        key: train.eval_batch_size

  finetune_batch_size:
    suggest: categorical
    choices: [8, 16]
    target: config
    config_updates:
      - config: finetune
        key: train.batch_size
      - config: finetune
        key: train.eval_batch_size

  pretrain_lr:
    suggest: float
    low: 1e-5
    high: 1e-3
    log: true
    target: config
    config_updates:
      - config: train
        key: train.lr

  finetune_lr:
    suggest: float
    low: 1e-5
    high: 1e-3
    log: true
    target: config
    config_updates:
      - config: finetune
        key: finetune.lr

  weight_decay:
    suggest: float
    low: 1e-6
    high: 1e-2
    log: true
    target: config
    config_updates:
      - config: train
        key: train.weight_decay
      - config: finetune
        key: finetune.weight_decay

  min_lr:
    suggest: float
    low: 1e-7
    high: 1e-4
    log: true
    target: config
    config_updates:
      - config: train
        key: train.min_lr
      - config: finetune
        key: finetune.min_lr

  hidden_dim:
    suggest: categorical
    choices: [128, 256, 512]
    target: config
    config_updates:
      - config: finetune
        key: finetune.hidden_dim

  grad_clip:
    suggest: categorical
    choices: [0.0, 0.5, 1.0, 5.0]
    target: config
    config_updates:
      - config: train
        key: train.grad_clip
      - config: finetune
        key: finetune.grad_clip

  early_stop_patience:
    suggest: categorical
    choices: [5, 8, 10]
    target: config
    config_updates:
      - config: finetune
        key: finetune.early_stop_patience

parameter_groups:
  pretrain: [train_epochs, pretrain_batch_size, pretrain_lr, weight_decay, min_lr, grad_clip]
  finetune: [train_epochs, finetune_batch_size, finetune_lr, weight_decay, min_lr, hidden_dim, grad_clip, early_stop_patience]

modes:
  full:
    study_name: optuna_ds002338_full
    output_dir: outputs/optuna/ds002338_full
    parameter_groups: [pretrain, finetune]

  finetune_only:
    study_name: optuna_ds002338_finetune_only
    output_dir: outputs/optuna/ds002338_finetune_only
    static_args: [--skip-pretrain]
    metric:
      path: finetune/loso_finetune_summary.csv
      column: macro_f1
      row_filter:
        fold: CROSS_FOLD_MEAN_STD
    parameter_groups: [finetune]

  pretrain_only:
    study_name: optuna_ds002338_pretrain_only
    output_dir: outputs/optuna/ds002338_pretrain_only
    static_args: [--skip-finetune]
    metric:
      type: json
      path: contrastive/final_metrics.json
      key: best_score
      transform: negate
    parameter_groups: [pretrain]
