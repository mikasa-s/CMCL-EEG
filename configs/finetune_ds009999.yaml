train:
  force_cpu: false
  gpu_count: 1
  gpu_ids: []
  batch_size: 64
  eval_batch_size: 64
  num_workers: 4
  pin_memory: true

data:
  train_manifest_csv: cache/ds009999/loso_subjectwise/fold_ds009999_sub01/manifest_train.csv
  val_manifest_csv: cache/ds009999/loso_subjectwise/fold_ds009999_sub01/manifest_val.csv
  test_manifest_csv: cache/ds009999/loso_subjectwise/fold_ds009999_sub01/manifest_test.csv
  root_dir: cache/ds009999
  preload_dataset: false
  eeg_channel_subset: auto
  eeg_channel_target_manifest: cache/ds009999/eeg_channels_target.csv
  expected_eeg_shape: [62, 8, 200]
  normalize_eeg: true
  eeg_scale: 1.0

eeg_model:
  checkpoint_path: ""
  in_dim: 200
  out_dim: 200
  d_model: 200
  dim_feedforward: 800
  seq_len: 8
  shared_dim: 256
  private_dim: 256
  band_power_dim: 5
  n_layer: 12
  nhead: 8
  freeze_backbone: false

fmri_model:
  backbone: neurostorm
  checkpoint_path: ""
  shared_dim: 256
  img_size: [48, 48, 48, 1]
  in_chans: 1
  embed_dim: 24
  first_window_size: [2, 2, 2, 2]
  window_size: [4, 4, 4, 4]
  patch_size: [6, 6, 6, 1]
  depths: [2, 2, 6, 2]
  num_heads: [3, 6, 12, 24]
  c_multiplier: 2
  last_layer_full_MSA: false
  attn_drop_rate: 0.0
  freeze_backbone: false

finetune:
  output_dir: outputs/ds009999/finetune/fold_ds009999_sub01
  contrastive_checkpoint_path: ""
  num_classes: 3
  selection_metric: macro_f1
  fusion: eeg_only
  classifier_mode: concat
  eeg_baseline:
    enabled: false
    model_name: cbramod
    num_classes: 3
    num_channels: 62
    num_timepoints: 200
    load_pretrained_weights: false
    checkpoint_path: ""
  hidden_dim: 256
  head_dropout: 0.0
  dropout: 0.2
  freeze_encoders: false
  epochs: 30
  lr: 0.0003
  min_lr: 0.00001
  weight_decay: 0.01
  grad_clip: 1.0
  early_stop_patience: 10
  early_stop_min_delta: 0.0
  use_amp: true
  amp_dtype: fp16
  log_interval: 100
  eval_interval: 1
  visualization:
    train_curve:
      enabled: false
      output_dir: ""
    confusion_matrix:
      enabled: false
