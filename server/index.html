<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CMCL-EEG Training Console</title>
  <style>
    :root {
      --bg-a: #f7fbff;
      --bg-b: #edf4ff;
      --panel: rgba(255, 255, 255, 0.84);
      --line: rgba(128, 153, 194, 0.22);
      --line-strong: rgba(41, 110, 242, 0.22);
      --ink: #162238;
      --muted: #65758c;
      --blue: #2f73f6;
      --shadow: 0 24px 52px rgba(73, 105, 168, 0.14);
      --radius-xl: 28px;
      --radius-lg: 22px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "Segoe UI Variable", "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at 0% 0%, rgba(47, 115, 246, 0.14), transparent 28%),
        radial-gradient(circle at 100% 0%, rgba(18, 168, 155, 0.12), transparent 24%),
        linear-gradient(180deg, var(--bg-a) 0%, var(--bg-b) 100%);
    }

    .shell {
      max-width: 1600px;
      margin: 0 auto;
      padding: 24px;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      align-items: flex-end;
      margin-bottom: 18px;
    }

    .hero h1 {
      margin: 0 0 10px 0;
      font-size: 38px;
      line-height: 1.05;
      letter-spacing: 0.01em;
    }

    .hero p {
      margin: 0;
      max-width: 880px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .hero-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }

    .hero-tag {
      padding: 9px 14px;
      border-radius: 999px;
      border: 1px solid rgba(47, 115, 246, 0.14);
      background: rgba(47, 115, 246, 0.08);
      color: #2d65d0;
      font-size: 12px;
      letter-spacing: 0.04em;
    }

    .layout {
      display: grid;
      grid-template-columns: 420px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .sidebar {
      padding: 18px;
      position: sticky;
      top: 18px;
    }

    .content {
      padding: 18px;
    }

    .section-block {
      margin-bottom: 14px;
      padding: 16px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(246, 250, 255, 0.94));
    }

    .section-block:last-child {
      margin-bottom: 0;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .section-head h2,
    .content h2 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
    }

    .section-kicker {
      margin: 0 0 6px 0;
      color: var(--blue);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 0 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
    }

    .status-chip.training {
      color: #0b6d61;
      background: rgba(18, 168, 155, 0.12);
      border: 1px solid rgba(18, 168, 155, 0.18);
    }

    .status-chip.end {
      color: #5f6c82;
      background: rgba(121, 139, 171, 0.1);
      border: 1px solid rgba(121, 139, 171, 0.16);
    }

    .status-chip.error {
      color: #b94556;
      background: rgba(214, 91, 106, 0.1);
      border: 1px solid rgba(214, 91, 106, 0.16);
    }

    .status-chip .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.85;
    }

    .field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .field {
      margin-bottom: 10px;
    }

    .field:last-child {
      margin-bottom: 0;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.96);
      color: var(--ink);
      padding: 11px 12px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.14s ease, box-shadow 0.14s ease, transform 0.14s ease;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--line-strong);
      box-shadow: 0 0 0 4px rgba(47, 115, 246, 0.1);
      transform: translateY(-1px);
    }

    textarea {
      min-height: 94px;
      resize: vertical;
      line-height: 1.55;
      font-family: "Cascadia Code", "Consolas", monospace;
    }

    .toggle-line {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 2px;
      color: var(--muted);
      font-size: 13px;
    }

    .toggle-line input {
      width: auto;
      accent-color: var(--blue);
      margin: 0;
    }

    .hint {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.65;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 11px 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      color: #ffffff;
      background: linear-gradient(135deg, #4c95ff, #2f73f6);
      box-shadow: 0 12px 28px rgba(47, 115, 246, 0.26);
      transition: transform 0.14s ease, box-shadow 0.14s ease, opacity 0.14s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 32px rgba(47, 115, 246, 0.28);
    }

    button.secondary {
      background: linear-gradient(135deg, #7e8aa1, #67768e);
      box-shadow: 0 12px 28px rgba(103, 118, 142, 0.2);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 12px;
      margin: 16px 0 18px 0;
    }

    .summary-card {
      min-height: 110px;
      padding: 16px;
      border-radius: 20px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(243, 248, 255, 0.96));
    }

    .summary-card .label {
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .summary-card .value {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.35;
      word-break: break-word;
    }

    .summary-card .value.compact {
      font-size: 15px;
      font-weight: 600;
    }

    .monitor-toolbar {
      display: flex;
      justify-content: flex-start;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
    }

    .mode-switch {
      display: inline-flex;
      gap: 8px;
      padding: 6px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.72);
    }

    .mode-switch button {
      min-width: 120px;
      padding: 10px 16px;
      background: transparent;
      color: var(--muted);
      box-shadow: none;
    }

    .mode-switch button.active {
      color: #ffffff;
      background: linear-gradient(135deg, #4c95ff, #2f73f6);
      box-shadow: 0 10px 22px rgba(47, 115, 246, 0.22);
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    iframe {
      width: 100%;
      min-height: 980px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.95);
    }

    .finetune-visuals {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .monitor-shell {
      padding: 18px;
      border-radius: 24px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(243, 248, 255, 0.96));
      box-shadow: 0 18px 38px rgba(73, 105, 168, 0.1);
    }

    .monitor-shell h3 {
      margin: 0 0 18px 0;
      font-size: 28px;
      line-height: 1.1;
      letter-spacing: 0.01em;
    }

    .monitor-section {
      margin-bottom: 18px;
    }

    .monitor-section:last-child {
      margin-bottom: 0;
    }

    .monitor-section-title {
      margin: 0 0 12px 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .monitor-stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .monitor-stat {
      min-height: 110px;
      padding: 16px;
      border-radius: 20px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(243, 248, 255, 0.96));
      box-shadow: 0 14px 28px rgba(73, 105, 168, 0.08);
    }

    .monitor-stat .label {
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .monitor-stat .value {
      font-size: 19px;
      font-weight: 700;
      line-height: 1.35;
      word-break: break-word;
    }

    .monitor-stat .value.compact {
      font-size: 15px;
      font-weight: 600;
    }

    .visual-card {
      position: relative;
      min-height: 380px;
      padding: 18px;
      border-radius: 24px;
      border: 1px solid rgba(123, 145, 180, 0.16);
      background: rgba(255, 255, 255, 0.82);
      overflow: hidden;
    }

    .visual-card h3 {
      margin: 0 0 18px 0;
      font-size: 16px;
      letter-spacing: 0.01em;
    }

    .image-shell {
      position: relative;
      min-height: 300px;
      border-radius: 18px;
      border: 1px solid rgba(123, 145, 180, 0.18);
      background: linear-gradient(180deg, rgba(250, 252, 255, 0.98), rgba(242, 247, 255, 0.98));
      overflow: hidden;
    }

    .image-shell img {
      display: block;
      width: 100%;
      height: auto;
      min-height: 300px;
      object-fit: contain;
      background: #ffffff;
    }

    .image-empty {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px;
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      line-height: 1.7;
    }

    .runtime-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .runtime-card {
      padding: 16px;
      border-radius: 22px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(244, 248, 255, 0.96));
    }

    .runtime-card h3 {
      margin: 0 0 14px 0;
      font-size: 16px;
    }

    .runtime-card pre {
      margin: 0 0 14px 0;
      padding: 14px;
      min-height: 120px;
      max-height: 320px;
      overflow: auto;
      border-radius: 16px;
      border: 1px solid rgba(123, 145, 180, 0.16);
      background: #f8fbff;
      color: #20314c;
      font-family: "Cascadia Code", "Consolas", monospace;
      font-size: 12px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .runtime-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .runtime-meta .meta {
      padding: 12px;
      border-radius: 16px;
      border: 1px solid rgba(123, 145, 180, 0.16);
      background: rgba(255, 255, 255, 0.84);
    }

    .runtime-meta .meta .label {
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .runtime-meta .meta .value {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.45;
      word-break: break-word;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 1360px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
      }

      .summary-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 960px) {
      .hero {
        flex-direction: column;
        align-items: flex-start;
      }

      .field-grid,
      .summary-grid,
      .monitor-stats,
      .finetune-visuals,
      .runtime-grid,
      .runtime-meta {
        grid-template-columns: 1fr;
      }

      .monitor-toolbar {
        flex-direction: column;
        align-items: stretch;
      }

      .mode-switch {
        width: 100%;
      }

      .mode-switch button {
        flex: 1 1 0;
        min-width: 0;
      }

      iframe {
        min-height: 760px;
      }
    }
  </style>
</head>

<body>
  <div class="shell">
    <header class="hero">
      <div>
        <h1>CMCL-EEG Training Console</h1>
        <p>预训练和微调共用一个主页面。左侧负责启动和停止任务，右侧负责看在线监控</p>
      </div>
      <div class="hero-tags">
      </div>
    </header>

    <div class="layout">
      <aside class="panel sidebar">
        <section class="section-block">
          <div class="section-kicker">Pretrain</div>
          <div class="section-head">
            <h2>预训练</h2>
            <div id="pretrainStateChip" class="status-chip end"><span class="dot"></span>end</div>
          </div>
          <div class="field full">
            <label for="config">配置文件</label>
            <select id="config"></select>
          </div>
          <div class="field-grid">
            <div class="field">
              <label for="pretrain_mode">运行模式</label>
              <select id="pretrain_mode">
                <option value="full">full</option>
                <option value="strict">strict</option>
              </select>
            </div>
            <div class="field">
              <label for="projection_method">投影方式</label>
              <select id="projection_method">
                <option value="pca">pca</option>
                <option value="tsne">tsne</option>
              </select>
            </div>
          </div>
          <div class="field-grid">
            <div class="field">
              <label for="target_dataset">目标数据集</label>
              <input id="target_dataset" type="text" value="ds002336" />
            </div>
            <div class="field">
              <label for="held_out_subject">留出被试</label>
              <input id="held_out_subject" type="text" placeholder="例如 ds002336_sub01" />
            </div>
          </div>
          <div class="field-grid">
            <div class="field">
              <label for="max_samples">监控样本数</label>
              <input id="max_samples" type="number" value="1000" min="1" step="1" />
            </div>
            <div class="field">
              <label for="train_max_samples">训练样本数</label>
              <input id="train_max_samples" type="number" value="1000" min="1" step="1" />
              <label class="toggle-line" for="lockTrainSamples">
                <input id="lockTrainSamples" type="checkbox" checked />
                训练样本数跟随监控样本数
              </label>
            </div>
          </div>
          <div class="field-grid">
            <div class="field">
              <label for="tsne_max_points">投影点数上限</label>
              <input id="tsne_max_points" type="number" value="1000" min="1" step="1" />
            </div>
            <div class="field">
              <label for="tsne_interval_epochs">投影间隔 Epoch</label>
              <input id="tsne_interval_epochs" type="number" value="1" min="1" step="1" />
            </div>
          </div>
          <div class="field-grid">
            <div class="field">
              <label for="refresh_interval_sec">刷新间隔（秒）</label>
              <input id="refresh_interval_sec" type="number" value="10" min="1" step="1" />
            </div>
            <div class="field">
              <label for="force_cpu">强制 CPU</label>
              <select id="force_cpu">
                <option value="false">false</option>
                <option value="true">true</option>
              </select>
            </div>
          </div>
          <div class="field">
            <label for="extra_set">附加 --set 参数</label>
            <textarea id="extra_set" placeholder="train.epochs=5&#10;train.batch_size=64"></textarea>
          </div>
          <div class="actions">
            <button id="startBtn" type="button">启动预训练</button>
            <button id="stopBtn" type="button" class="secondary">停止预训练</button>
          </div>
        </section>

        <section class="section-block">
          <div class="section-kicker">Finetune</div>
          <div class="section-head">
            <h2>微调</h2>
            <div id="finetuneStateChip" class="status-chip end"><span class="dot"></span>end</div>
          </div>
          <div class="field full">
            <label for="finetune_config">配置文件</label>
            <select id="finetune_config"></select>
          </div>
          <div class="field">
            <label for="finetune_epochs">Epoch</label>
            <input id="finetune_epochs" type="number" value="50" min="1" step="1" />
          </div>
          <div class="field">
            <label for="finetune_mode">模式</label>
            <select id="finetune_mode">
              <option value="single">single-fold</option>
              <option value="loso">loso</option>
            </select>
          </div>
          <div class="actions">
            <button id="startFinetuneBtn" type="button">启动微调</button>
            <button id="stopFinetuneBtn" type="button" class="secondary">停止微调</button>
          </div>
        </section>
      </aside>

      <main class="panel content">
        <div class="section-head">
          <h2>在线监控</h2>
        </div>
        <div class="summary-grid">
          <div class="summary-card">
            <div class="label">Pretrain Status</div>
            <div class="value" id="summaryPretrainStatus">end</div>
          </div>
          <div class="summary-card">
            <div class="label">Pretrain Objective</div>
            <div class="value compact" id="summaryPretrainObjective">--</div>
          </div>
          <div class="summary-card">
            <div class="label">Pretrain Output</div>
            <div class="value compact" id="summaryPretrainOutput">--</div>
          </div>
          <div class="summary-card">
            <div class="label">Finetune Status</div>
            <div class="value" id="summaryFinetuneStatus">end</div>
          </div>
          <div class="summary-card">
            <div class="label">Finetune Config</div>
            <div class="value compact" id="summaryFinetuneConfig">--</div>
          </div>
          <div class="summary-card">
            <div class="label">Finetune Output</div>
            <div class="value compact" id="summaryFinetuneOutput">--</div>
          </div>
        </div>
        <div class="monitor-toolbar">
          <div class="mode-switch">
            <button type="button" class="active" data-view="pretrainView">预训练监控</button>
            <button type="button" data-view="finetuneView">微调监控</button>
            <button type="button" data-view="runtimeView">运行信息</button>
          </div>
        </div>
        <section id="pretrainView" class="view active">
          <iframe id="monitorFrame" src="about:blank" title="预训练在线监控"></iframe>
        </section>
        <section id="finetuneView" class="view">
          <iframe id="finetuneMonitorFrame" src="about:blank" title="微调在线监控"></iframe>
        </section>
        <section id="runtimeView" class="view">
          <div class="runtime-grid">
            <article class="runtime-card">
              <h3>预训练运行信息</h3>
              <div class="runtime-meta">
                <div class="meta">
                  <div class="label">状态</div>
                  <div class="value" id="pretrainRuntimeState">end</div>
                </div>
                <div class="meta">
                  <div class="label">监控目录</div>
                  <div class="value" id="pretrainRuntimeRoot">--</div>
                </div>
              </div>
              <pre id="commandBox">--</pre>
              <pre id="logBox">--</pre>
            </article>
            <article class="runtime-card">
              <h3>微调运行信息</h3>
              <div class="runtime-meta">
                <div class="meta">
                  <div class="label">状态</div>
                  <div class="value" id="finetuneRuntimeState">end</div>
                </div>
                <div class="meta">
                  <div class="label">监控目录</div>
                  <div class="value" id="finetuneRuntimeRoot">--</div>
                </div>
              </div>
              <pre id="finetuneCommandBox">--</pre>
              <pre id="finetuneLogBox">--</pre>
            </article>
          </div>
        </section>
      </main>
    </div>
  </div>
  <script>
    let pretrainConfigPresets = {};
    let finetuneConfigPresets = {};
    let extraSetTouched = false;
    let statusPollTimer = null;
    let isStatusLoading = false;

    function $ (id) {
      return document.getElementById(id);
    }

    async function fetchJSON (url, options) {
      const response = await fetch(url, options);
      const payload = await response.json();
      if (!response.ok) {
        throw new Error(payload.error || "Request failed");
      }
      return payload;
    }

    function splitExtraSet (text) {
      return (text || "")
        .split(/\r?\n/)
        .map((line) => line.trim())
        .filter((line) => line.length > 0);
    }

    function safeGet (object, paths, fallback) {
      for (let index = 0; index < paths.length; index += 1) {
        const path = paths[index];
        let cursor = object;
        let valid = true;
        for (let partIndex = 0; partIndex < path.length; partIndex += 1) {
          let key = path[partIndex];
          if (Array.isArray(cursor) && typeof key === "number" && key < 0) {
            key = cursor.length + key;
          }
          if (cursor && Object.prototype.hasOwnProperty.call(cursor, key)) {
            cursor = cursor[key];
          } else {
            valid = false;
            break;
          }
        }
        if (valid && cursor !== undefined && cursor !== null && cursor !== "") {
          return cursor;
        }
      }
      return fallback;
    }

    function formatMetric (value, digits) {
      if (value === undefined || value === null || value === "") return "--";
      const numeric = Number(value);
      if (!Number.isFinite(numeric)) return String(value);
      return numeric.toFixed(digits);
    }

    function normalizeState (status) {
      if (!status) return "end";
      if (status.running) return "training";
      if (status.error) return "error";
      return "end";
    }

    function updateChip (node, state) {
      node.className = "status-chip " + state;
      node.innerHTML = '<span class="dot"></span>' + state;
    }

    function syncTrainSamplesIfLocked () {
      if (!$("lockTrainSamples").checked) return;
      $("train_max_samples").value = $("max_samples").value;
    }

    function buildExtraSetTemplate (configPath) {
      const preset = pretrainConfigPresets[configPath] || {};
      const batchSize = Number(preset.batch_size || 128);
      return "train.epochs=5\ntrain.batch_size=" + String(batchSize);
    }

    function applyExtraSetTemplate (force) {
      if (!force && extraSetTouched) return;
      $("extra_set").value = buildExtraSetTemplate($("config").value);
    }

    function updatePretrainConfigOptions (availableConfigs) {
      const select = $("config");
      const currentValue = select.value || "configs/train_joint_contrastive.yaml";
      if (!availableConfigs || !availableConfigs.length) {
        applyExtraSetTemplate(false);
        return;
      }
      pretrainConfigPresets = {};
      availableConfigs.forEach((item) => {
        pretrainConfigPresets[item.path] = item;
      });
      select.innerHTML = availableConfigs
        .map((item) => '<option value="' + item.path + '">' + item.path + "</option>")
        .join("");
      if (pretrainConfigPresets[currentValue]) {
        select.value = currentValue;
      } else if (pretrainConfigPresets["configs/train_joint_contrastive.yaml"]) {
        select.value = "configs/train_joint_contrastive.yaml";
      } else {
        select.selectedIndex = 0;
      }
      applyExtraSetTemplate(false);
    }

    function updateFinetuneConfigOptions (availableConfigs) {
      const select = $("finetune_config");
      const currentValue = select.value;
      if (!availableConfigs || !availableConfigs.length) {
        select.innerHTML = "";
        finetuneConfigPresets = {};
        return;
      }
      finetuneConfigPresets = {};
      availableConfigs.forEach((item) => {
        finetuneConfigPresets[item.path] = item;
      });
      select.innerHTML = availableConfigs
        .map((item) => '<option value="' + item.path + '">' + item.path + "</option>")
        .join("");
      if (availableConfigs.some((item) => item.path === currentValue)) {
        select.value = currentValue;
      }
    }

    function inferFinetuneHeldOutSubject () {
      const selected = finetuneConfigPresets[$("finetune_config").value];
      const outputDir = selected && selected.output_dir ? String(selected.output_dir) : "";
      const match = outputDir.match(/fold_([^\\/]+)/i);
      return match ? match[1] : "";
    }

    function buildMonitorPlaceholder () {
      return `<!DOCTYPE html>
<html lang="zh-CN">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

</head>
<body>

    }

    function setMonitorPlaceholder () {
      const frame = $("monitorFrame");
      if (frame.dataset.mode === "placeholder") return;
      frame.removeAttribute("src");
      frame.srcdoc = buildMonitorPlaceholder();
      frame.dataset.mode = "placeholder";
      frame.dataset.currentSrc = "";
    }

    function buildFinetuneMonitorDoc () {
      return `<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <style>
    :root {
      --bg: #f4f8ff;
      --panel: #ffffff;
      --panel-2: #f8fbff;
      --ink: #162033;
      --muted: #62748d;
      --line: rgba(130, 154, 196, 0.2);
      --shadow: 0 20px 48px rgba(63, 90, 160, 0.12);
    }
    body {
      margin: 0;
      padding: 24px;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(47, 125, 246, 0.12), transparent 24%),
        radial-gradient(circle at bottom right, rgba(15, 181, 167, 0.10), transparent 20%),
        linear-gradient(180deg, #fbfdff 0%, #f5f9ff 48%, #f1f6ff 100%);
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", "Segoe UI", sans-serif;
      line-height: 1.55;
    }
    h1 {
      margin: 0 0 8px 0;
      font-size: 34px;
      font-weight: 700;
    }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      box-shadow: var(--shadow);
    }
    .card h2 {
      margin: 0 0 14px 0;
      font-size: 22px;
      font-weight: 700;
    }
    img {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      display: block;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin: 10px 0 14px 0;
    }
    .stat {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
    }
    .label { font-size: 13px; color: var(--muted); }
    .value {
      font-size: 20px;
      font-weight: 700;
      margin-top: 6px;
      line-height: 1.35;
    }
    code {
      background: #eef3ff;
      padding: 2px 6px;
      border-radius: 6px;
      font-family: "Cascadia Code", "Consolas", monospace;
    }
    .empty {
      padding: 28px 18px;
      color: var(--muted);
      text-align: center;
      border: 1px dashed var(--line);
      border-radius: 14px;
      background: #fbfcff;
    }
    @media (max-width: 980px) {
      .grid { grid-template-columns: 1fr; }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 640px) {
      body { padding: 16px; }
      .stats { grid-template-columns: 1fr; }
      h1 { font-size: 28px; }
      .card h2 { font-size: 20px; }
    }
  </style>
</head>
<body>
  <h1>微调在线监控</h1>
  <div class="stats">
    <div class="stat"><div class="label">Status</div><div class="value" id="statStatus">--</div></div>
    <div class="stat"><div class="label">Epoch</div><div class="value" id="statEpoch">--</div></div>
    <div class="stat"><div class="label">Train Loss</div><div class="value" id="statTrainLoss">--</div></div>
    <div class="stat"><div class="label">Train Acc</div><div class="value" id="statTrainAccuracy">--</div></div>
    <div class="stat"><div class="label">Updated</div><div class="value" id="statUpdated">--</div></div>
    <div class="stat"><div class="label">Fold</div><div class="value" id="statFold">--</div></div>
    <div class="stat"><div class="label">Val Loss</div><div class="value" id="statValLoss">--</div></div>
    <div class="stat"><div class="label">Val Acc</div><div class="value" id="statValAccuracy">--</div></div>
  </div>
  <div class="grid">
    <div class="card"><h2>Train / Validation Loss Curve</h2><img id="lossCurveImage" alt="loss curve" /></div>
    <div class="card"><h2>Train / Validation Accuracy Curve</h2><img id="accuracyCurveImage" alt="accuracy curve" /></div>
  </div>
  <script>
    let refreshTimer = null;
    function scheduleRefresh(running) {
      if (refreshTimer) {
        window.clearTimeout(refreshTimer);
        refreshTimer = null;
      }
      if (!running) return;
      refreshTimer = window.setTimeout(refreshState, 3000);
    }
    function setText(id, value) {
      const node = document.getElementById(id);
      node.textContent = value === undefined || value === null || value === "" ? "--" : String(value);
    }
    function formatMetric(value) {
      const number = Number(value);
      return Number.isFinite(number) ? number.toFixed(4) : "--";
    }
    function parseMetricFromLogs(logTail, patterns) {
      if (!Array.isArray(logTail)) return null;
      for (let lineIndex = logTail.length - 1; lineIndex >= 0; lineIndex -= 1) {
        const line = String(logTail[lineIndex]);
        for (let patternIndex = 0; patternIndex < patterns.length; patternIndex += 1) {
          const pattern = patterns[patternIndex];
          const match = line.match(pattern);
          if (match) {
            return Number(match[1]);
          }
        }
      }
      return null;
    }
    function pick(object, candidates, fallback) {
      for (let i = 0; i < candidates.length; i += 1) {
        const path = candidates[i];
        let cursor = object;
        let ok = true;
        for (let j = 0; j < path.length; j += 1) {
          let key = path[j];
          if (Array.isArray(cursor) && typeof key === "number" && key < 0) {
            key = cursor.length + key;
          }
          if (cursor && Object.prototype.hasOwnProperty.call(cursor, key)) {
            cursor = cursor[key];
          } else {
            ok = false;
            break;
          }
        }
        if (ok && cursor !== undefined && cursor !== null && cursor !== "") {
          return cursor;
        }
      }
      return fallback;
    }
    async function fetchStatus() {
      const response = await fetch("/api/finetune/status", { cache: "no-store" });
      return await response.json();
    }
    async function fetchMonitorState() {
      const response = await fetch("/finetune-monitor/monitor_state.json?ts=" + Date.now(), { cache: "no-store" });
      if (!response.ok) return null;
      return await response.json();
    }
    async function refreshState() {
      try {
        const status = await fetchStatus();
        const running = Boolean(status.running);
        const monitorState = status.monitor_root ? await fetchMonitorState() : null;
        const phase = pick(monitorState || {}, [["phase"], ["status", "phase"]], running ? "training" : "end");
        const epochValue = pick(monitorState || {}, [["status", "epoch"], ["epoch"], ["latest", "epoch"], ["last_epoch", "epoch"]], status.epochs || "--");
        const foldValue = pick(monitorState || {}, [["status", "fold"], ["fold"], ["latest", "fold"]], "--");
        const updatedValue = pick(monitorState || {}, [["updated_at"], ["updated"], ["status", "updated_at"], ["status", "updated"]], "--");
        const trainLossValue = pick(monitorState || {}, [["latest_train_loss"], ["latest", "train_loss"], ["last_epoch", "train_loss"], ["status", "train_loss"], ["history", -1, "train_loss"]], null);
        const trainAccuracyValue = pick(
          monitorState || {},
          [["latest_train_accuracy"], ["latest", "train_accuracy"], ["last_epoch", "train_accuracy"], ["history", -1, "train_accuracy"], ["status", "train_accuracy"]],
          parseMetricFromLogs(status.log_tail, [/train_acc(?:uracy)?=([0-9.]+)/i, /train[_ ]accuracy[:= ]+([0-9.]+)/i])
        );
        const valLossValue = pick(monitorState || {}, [["latest_val_loss"], ["latest", "val_loss"], ["last_epoch", "val_loss"], ["val_metrics", "loss"], ["val_metrics", "val_loss"], ["status", "val_loss"]], null);
        const valAccuracyValue = pick(
          monitorState || {},
          [["latest_val_accuracy"], ["latest", "val_accuracy"], ["last_epoch", "val_accuracy"], ["val_metrics", "accuracy"], ["val_metrics", "acc"], ["status", "accuracy"]],
          parseMetricFromLogs(status.log_tail, [/val_acc(?:uracy)?=([0-9.]+)/i, /val[_ ]accuracy[:= ]+([0-9.]+)/i])
        );
        const normalizedPhase = phase === "finished" ? "end" : phase;
        const displayStatus = !running && status.returncode !== undefined && status.returncode !== null
          ? (Number(status.returncode) === 0 ? "end" : "error")
          : normalizedPhase;
        const keepRefreshing = running || (normalizedPhase === "training" && (status.returncode === undefined || status.returncode === null));
        setText("statStatus", displayStatus);
        setText("statEpoch", epochValue);
        setText("statTrainLoss", formatMetric(trainLossValue));
        setText("statTrainAccuracy", formatMetric(trainAccuracyValue));
        setText("statUpdated", updatedValue);
        setText("statFold", foldValue);
        setText("statValLoss", formatMetric(valLossValue));
        setText("statValAccuracy", formatMetric(valAccuracyValue));
        const version = Date.now();
        document.getElementById("lossCurveImage").src = "/finetune-monitor/loss_curve.svg?v=" + version;
        document.getElementById("accuracyCurveImage").src = "/finetune-monitor/accuracy_curve.svg?v=" + version;
        scheduleRefresh(keepRefreshing);
      } catch (error) {
        console.error(error);
        scheduleRefresh(false);
      }
    }
    refreshState();
  <\/script>
</body>
</html>`;
    }

    function ensureFinetuneMonitorDoc (force) {
      const frame = $("finetuneMonitorFrame");
      if (!frame) return;
      if (!force && frame.dataset.mode === "srcdoc") return;
      frame.removeAttribute("src");
      frame.srcdoc = buildFinetuneMonitorDoc();
      frame.dataset.mode = "srcdoc";
      frame.dataset.currentSrc = "";
    }

    function activateView (viewId) {
      document.querySelectorAll(".view").forEach((node) => {
        node.classList.toggle("active", node.id === viewId);
      });
      document.querySelectorAll(".mode-switch button").forEach((node) => {
        node.classList.toggle("active", node.dataset.view === viewId);
      });
      if (viewId === "finetuneView") {
        ensureFinetuneMonitorDoc(false);
      }
    }

    function refreshFinetuneImage (imgId, emptyId, path, enabled) {
      const img = $(imgId);
      const empty = $(emptyId);
      if (!enabled) {
        img.removeAttribute("src");
        img.classList.add("hidden");
        empty.classList.remove("hidden");
        return;
      }
      img.onerror = function () {
        img.classList.add("hidden");
        empty.classList.remove("hidden");
      };
      img.onload = function () {
        img.classList.remove("hidden");
        empty.classList.add("hidden");
      };
      img.src = path + "?v=" + Date.now();
    }

    function renderPretrainStatus (status) {
      const state = normalizeState(status);
      updateChip($("pretrainStateChip"), state);
      $("summaryPretrainStatus").textContent = state;
      $("summaryPretrainObjective").textContent = status.objective_name || "--";
      $("summaryPretrainOutput").textContent = status.output_dir || "--";
      $("pretrainRuntimeState").textContent = state;
      $("pretrainRuntimeRoot").textContent = status.monitor_root || "--";
      $("commandBox").textContent = (status.command || []).join(" ") || "--";
      $("logBox").textContent = (status.log_tail || []).join("\n") || "--";
      const frame = $("monitorFrame");
      if (status.monitor_url) {
        if (frame.dataset.currentSrc !== status.monitor_url) {
          frame.removeAttribute("srcdoc");
          frame.src = status.monitor_url;
          frame.dataset.mode = "live";
          frame.dataset.currentSrc = status.monitor_url;
        }
      } else {
        setMonitorPlaceholder();
      }
    }

    function renderFinetuneStatus (status) {
      const state = !status.running && status.returncode !== undefined && status.returncode !== null
        ? (Number(status.returncode) === 0 ? "end" : "error")
        : normalizeState(status);
      updateChip($("finetuneStateChip"), state);
      $("summaryFinetuneStatus").textContent = state;
      $("summaryFinetuneConfig").textContent = status.config || $("finetune_config").value || "--";
      $("summaryFinetuneOutput").textContent = status.output_dir || "--";
      $("finetuneRuntimeState").textContent = state;
      $("finetuneRuntimeRoot").textContent = status.monitor_root || "--";
      $("finetuneCommandBox").textContent = (status.command || []).join(" ") || "--";
      $("finetuneLogBox").textContent = (status.log_tail || []).join("\n") || "--";
      ensureFinetuneMonitorDoc(false);
    }

    function setPollingEnabled (enabled) {
      if (statusPollTimer) {
        window.clearTimeout(statusPollTimer);
        statusPollTimer = null;
      }
      if (!enabled) return;
      statusPollTimer = window.setTimeout(function () {
        loadAllStatus().catch((error) => console.error(error));
      }, 3000);
    }

    async function loadAllStatus () {
      if (isStatusLoading) return;
      isStatusLoading = true;
      const results = await Promise.allSettled([
        fetchJSON("/api/status"),
        fetchJSON("/api/finetune/status"),
      ]);
      let anyRunning = false;
      if (results[0].status === "fulfilled") {
        renderPretrainStatus(results[0].value);
        updatePretrainConfigOptions(results[0].value.available_configs || []);
        anyRunning = anyRunning || Boolean(results[0].value.running);
      }
      if (results[1].status === "fulfilled") {
        await renderFinetuneStatus(results[1].value);
        updateFinetuneConfigOptions(results[1].value.available_configs || []);
        anyRunning = anyRunning || Boolean(results[1].value.running);
      }
      isStatusLoading = false;
      setPollingEnabled(anyRunning);
    }

    async function startPretrain () {
      syncTrainSamplesIfLocked();
      const payload = {
        config: $("config").value,
        pretrain_mode: $("pretrain_mode").value,
        target_dataset: $("target_dataset").value.trim(),
        held_out_subject: $("held_out_subject").value.trim(),
        train_max_samples: Number($("train_max_samples").value),
        max_samples: Number($("max_samples").value),
        tsne_max_points: Number($("tsne_max_points").value),
        tsne_interval_epochs: Number($("tsne_interval_epochs").value),
        projection_method: $("projection_method").value,
        update_interval_steps: 20,
        refresh_interval_sec: Number($("refresh_interval_sec").value),
        force_cpu: $("force_cpu").value === "true",
        extra_set: splitExtraSet($("extra_set").value),
      };
      try {
        await fetchJSON("/api/start", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        activateView("pretrainView");
        setPollingEnabled(false);
        await loadAllStatus();
      } catch (error) {
        alert(error.message);
      }
    }

    async function stopPretrain () {
      try {
        await fetchJSON("/api/stop", { method: "POST" });
        setPollingEnabled(false);
        await loadAllStatus();
      } catch (error) {
        alert(error.message);
      }
    }

    async function startFinetune () {
      const mode = $("finetune_mode").value;
      const payload = {
        config: $("finetune_config").value,
        epochs: $("finetune_epochs").value,
        mode: mode,
        held_out_subject: mode === "single" ? inferFinetuneHeldOutSubject() : "",
      };
      try {
        await fetchJSON("/api/finetune/start", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        ensureFinetuneMonitorDoc(true);
        activateView("finetuneView");
        setPollingEnabled(false);
        await loadAllStatus();
      } catch (error) {
        alert(error.message);
      }
    }

    async function stopFinetune () {
      try {
        await fetchJSON("/api/finetune/stop", { method: "POST" });
        ensureFinetuneMonitorDoc(true);
        setPollingEnabled(false);
        await loadAllStatus();
      } catch (error) {
        alert(error.message);
      }
    }

    function bindEvents () {
      $("startBtn").addEventListener("click", startPretrain);
      $("stopBtn").addEventListener("click", stopPretrain);
      $("startFinetuneBtn").addEventListener("click", startFinetune);
      $("stopFinetuneBtn").addEventListener("click", stopFinetune);
      $("max_samples").addEventListener("input", syncTrainSamplesIfLocked);
      $("lockTrainSamples").addEventListener("change", syncTrainSamplesIfLocked);
      $("config").addEventListener("change", function () {
        applyExtraSetTemplate(false);
      });
      $("extra_set").addEventListener("input", function () {
        extraSetTouched = true;
      });
      document.querySelectorAll(".mode-switch button").forEach((button) => {
        button.addEventListener("click", function () {
          activateView(button.dataset.view);
        });
      });
    }

    bindEvents();
    setMonitorPlaceholder();
    applyExtraSetTemplate(true);
    activateView("pretrainView");
    loadAllStatus().catch((error) => console.error(error));
  </script>
</body>
